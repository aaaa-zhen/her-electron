<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Her Remote</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Remote Access</div>
        <h1>Her</h1>
      </div>
      <div class="status">
        <span id="statusDot" class="status-dot offline"></span>
        <span id="statusText">未连接</span>
      </div>
    </header>

    <section id="authCard" class="card auth-card">
      <h2>连接你的 Her</h2>
      <p>这个页面只做转发，真正的数据和能力都还在你的 Mac 上。</p>
      <label class="field">
        <span>Client Token</span>
        <input id="tokenInput" type="password" placeholder="输入 relay client token" />
      </label>
      <button id="connectBtn" class="primary">连接</button>
    </section>

    <section id="workspace" class="workspace hidden">
      <div class="quick-actions">
        <button data-job="timeline.today">今天做了什么</button>
        <button data-job="context.current">现在电脑在干嘛</button>
        <button data-job="artifact.recall">最近文件</button>
      </div>

      <div id="messages" class="messages"></div>

      <form id="composer" class="composer">
        <textarea id="input" rows="2" placeholder="和 Her 说点什么..."></textarea>
        <button class="primary" type="submit">发送</button>
      </form>
    </section>
  </div>
  <script src="/app.js?v=2"></script>
</body>
</html>
