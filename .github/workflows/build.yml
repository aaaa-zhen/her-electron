name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --mac --arm64 --publish never
      - run: npx electron-builder --mac --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            dist/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build APK
        working-directory: Pi/Pi
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' Pi/Pi/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cp Pi/Pi/app/build/outputs/apk/release/app-release-unsigned.apk "Her-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: "*.apk"

  release:
    needs: [build-mac, build-win, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.apk
          generate_release_notes: true
